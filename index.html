  if (val.startsWith('custom:')) {
    // Load saved custom preset
    const presets = loadPresets();
    const preset  = presets.find(p => p.id === val);
    if (preset) {
      currentKit = preset.baseKit;
      Object.entries(preset.knobs).forEach(([k, v]) => {
        P[k] = v;
        const kw = document.querySelector(`.kwrap[data-param="${k}"]`);
        if (!kw) return;
        const min = parseFloat(kw.dataset.min);
        const max = parseFloat(kw.dataset.max);
        const ptr = kw.querySelector('.kptr');
        const vd  = kw.querySelector('.kval');
        const rot = -135 + ((v - min) / (max - min)) * 270;
        if (ptr) ptr.style.transform = `rotate(${rot}deg)`;
        if (vd)  vd.textContent = Math.abs(v) < 10 ? v.toFixed(2) : v.toFixed(1);
      });
    }
  } else {
    currentKit = val;
    applyKitDefaults(val);
  }
});

/* ═════════════════════════════════════
   CUSTOM PRESET SAVE / LOAD
═════════════════════════════════════ */
const PRESET_KEY = 'microdrum_presets';

function loadPresets() {
  try { return JSON.parse(localStorage.getItem(PRESET_KEY)) || []; }
  catch { return []; }
}

function savePresets(arr) {
  try { localStorage.setItem(PRESET_KEY, JSON.stringify(arr)); } catch(e){}
}

function addPresetToSelect(preset) {
  const sel = document.getElementById('kit-select');
  // Remove existing option with same id if re-saving
  const existing = sel.querySelector(`option[value="${preset.id}"]`);
  if (existing) existing.remove();
  const opt = document.createElement('option');
  opt.value = preset.id;
  opt.textContent = `★ ${preset.name}`;
  sel.appendChild(opt);
}

function initPresets() {
  loadPresets().forEach(addPresetToSelect);
}

// Save button toggle
document.getElementById('save-btn').addEventListener('click', () => {
  document.getElementById('save-form').style.display = 'flex';
  document.getElementById('save-btn').style.display  = 'none';
  document.getElementById('preset-name').focus();
});

document.getElementById('preset-cancel').addEventListener('click', () => {
  document.getElementById('save-form').style.display = 'none';
  document.getElementById('save-btn').style.display  = '';
  document.getElementById('preset-name').value = '';
});

document.getElementById('preset-confirm').addEventListener('click', () => {
  const name = document.getElementById('preset-name').value.trim();
  if (!name) { document.getElementById('preset-name').focus(); return; }
  const preset = {
    id:      'custom:' + Date.now(),
    name,
    baseKit: currentKit.startsWith('custom:') ? (loadPresets().find(p=>p.id===currentKit)?.baseKit || 'acoustic') : currentKit,
    knobs:   { ...P },
  };
  const presets = loadPresets();
  presets.push(preset);
  savePresets(presets);
  addPresetToSelect(preset);
  // Select the new preset
  document.getElementById('kit-select').value = preset.id;
  document.getElementById('save-form').style.display = 'none';
  document.getElementById('save-btn').style.display  = '';
  document.getElementById('preset-name').value = '';
});

// Also save on Enter key in the name input
document.getElementById('preset-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('preset-confirm').click();
  if (e.key === 'Escape') document.getElementById('preset-cancel').click();
});

/* ═════════════════════════════════════
   OSCILLOSCOPE
═════════════════════════════════════ */
function startScope() {
  const cv = document.getElementById('scope');
  const wr = document.getElementById('scope-wrap');
  const cx = cv.getContext('2d');
  const buf = new Float32Array(analyser.fftSize);
  function sz() {
    const dpr = window.devicePixelRatio||1;
    cv.width  = wr.offsetWidth  * dpr;
    cv.height = wr.offsetHeight * dpr;
  }
  sz(); window.addEventListener('resize', sz);
  (function frame() {
    requestAnimationFrame(frame);
    if (!analyser) return;
    analyser.getFloatTimeDomainData(buf);
    const W=cv.width, H=cv.height;
    cx.fillStyle='rgba(239,232,216,0.88)'; cx.fillRect(0,0,W,H);
    cx.strokeStyle='rgba(196,180,152,0.32)'; cx.lineWidth=1;
    for(let g=1;g<4;g++){cx.beginPath();cx.moveTo(0,H*g/4);cx.lineTo(W,H*g/4);cx.stroke();}
    for(let g=1;g<8;g++){cx.beginPath();cx.moveTo(W*g/8,0);cx.lineTo(W*g/8,H);cx.stroke();}
    cx.strokeStyle='rgba(180,140,100,0.28)'; cx.beginPath(); cx.moveTo(0,H/2); cx.lineTo(W,H/2); cx.stroke();
    for(let p=0;p<2;p++){
      cx.beginPath();
      cx.strokeStyle=p?'rgba(115,84,52,0.82)':'rgba(184,92,56,0.10)';
      cx.lineWidth=p?1.3:5; cx.shadowBlur=p?3:0; cx.shadowColor='rgba(115,84,52,0.35)';
      const step=Math.max(1,Math.floor(buf.length/W));
      for(let x=0;x<W;x++){const v=buf[x*step]||0,y=(1-(v+1)/2)*H;x?cx.lineTo(x,y):cx.moveTo(x,y);}
      cx.stroke();
    }
    cx.shadowBlur=0;
  })();
}

/* ═════════════════════════════════════
   KEYBOARD SHORTCUTS
═════════════════════════════════════ */
const KM = {
  q:'tone-hi', w:'tone-mid', e:'tone-lo', r:'hh-open',
  a:'kick',    s:'snare',    d:'cymbal',  f:'hh-closed',
};
window.addEventListener('keydown', e => {
  if (document.documentElement.getAttribute('data-page')!=='drum') return;
  if (e.repeat||e.metaKey||e.ctrlKey) return;
  const type = KM[e.key]; if (!type) return;
  if (!actx) bootAudio();
  playDrum(type, 0.88);
  padHit(type);
});

/* ═════════════════════════════════════
   INIT
═════════════════════════════════════ */
buildKnobs();
bindPads();
applyKitDefaults('acoustic');  // start with acoustic knob positions
initPresets();                  // restore any saved custom presets from localStorage

})();

/* ════════════════════════════════════════════════════════════
   PAGE: KEYS — MegaSynth engine, ported from the original into LOOM.
   Wrapped in a closure; ms- prefixed DOM; audio routed into Loom.master.
   ════════════════════════════════════════════════════════════ */
(function(){
  const $ = id => document.getElementById(id);
  const BF={C:261.63,'C#':277.18,D:293.66,'D#':311.13,E:329.63,F:349.23,'F#':369.99,G:392,'G#':415.3,A:440,'A#':466.16,B:493.88};
  const hz=(n,o)=>BF[n]*Math.pow(2,o-4);
  const WN=['C','D','E','F','G','A','B'];
  const BN=['C#','D#','F#','G#','A#'];
  const BP=[0.62,1.62,3.62,4.62,5.62];
  const WPATHS={ sine:'M1 12 C3.5 2 6.5 2 10 12 C13.5 22 16.5 22 19 12', triangle:'M1 19 L7 3 L13 19 L19 3', sawtooth:'M1 19 L11 3 L11 19 L19 3', square:'M1 4 L8 4 L8 20 L14 20 L14 4 L19 4' };
  const KNOB_GROUPS=[
    {lbl:'ENV',knobs:[{p:'attack',l:'ATK',min:.001,max:4,v:.015},{p:'decay',l:'DEC',min:.01,max:4,v:.28},{p:'sustain',l:'SUS',min:0,max:1,v:.65},{p:'release',l:'REL',min:.01,max:6,v:.45}]},
    {lbl:'FILTER',knobs:[{p:'cutoff',l:'CUT',min:0,max:1,v:.76},{p:'resonance',l:'RES',min:0,max:1,v:.14}]},
    {lbl:'FX/MIX',knobs:[{p:'reverb',l:'REV',min:0,max:1,v:.18},{p:'detune',l:'DET',min:-1,max:1,v:0},{p:'volume',l:'VOL',min:0,max:1,v:.72}]},
  ];
  const P={attack:.015,decay:.28,sustain:.65,release:.45,cutoff:.76,resonance:.14,reverb:.18,detune:0,volume:.72};
  let bus=null,analyser=null,booted=false;
  let wave='sawtooth',oct=4,rng=2;
  const held={};

  function synthEnsure(){
    Loom.ensureAudio();
    if(booted) return;
    const actx=Loom.ctx;
    const master=actx.createGain(); master.gain.value=P.volume;
    const comp=actx.createDynamicsCompressor();
    comp.threshold.value=-3;comp.knee.value=2;comp.ratio.value=20;comp.attack.value=.001;comp.release.value=.08;
    analyser=actx.createAnalyser(); analyser.fftSize=1024;
    master.connect(comp);comp.connect(analyser);analyser.connect(Loom.master);
    const conv=actx.createConvolver();
    const sr=actx.sampleRate,len=Math.floor(sr*2.5);
    const ib=actx.createBuffer(2,len,sr);
    for(let c=0;c<2;c++){const d=ib.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.8);}
    conv.buffer=ib;
    const dry=actx.createGain();dry.gain.value=1;
    const wet=actx.createGain();wet.gain.value=P.reverb*1.6;
    dry.connect(master);wet.connect(conv);conv.connect(master);
    bus={master,dry,wet};
    $('ms-pwr-led').classList.add('on');
    $('ms-scope-idle').style.display='none';
    booted=true; startScope();
  }

  function noteOn(id,f){
    synthEnsure(); const actx=Loom.ctx;
    if(held[id])return;
    const osc=actx.createOscillator();
    osc.type=wave; osc.frequency.value=f; osc.detune.value=P.detune*100;
    const filt=actx.createBiquadFilter();
    filt.type='lowpass'; filt.frequency.value=60+Math.pow(P.cutoff,2)*18500; filt.Q.value=P.resonance*28;
    const env=actx.createGain();
    const t=actx.currentTime;
    env.gain.setValueAtTime(.00001,t);
    env.gain.exponentialRampToValueAtTime(.88,t+Math.max(.003,P.attack));
    env.gain.exponentialRampToValueAtTime(Math.max(.00001,P.sustain*.88),t+P.attack+Math.max(.003,P.decay));
    osc.connect(filt);filt.connect(env);env.connect(bus.dry);env.connect(bus.wet);
    osc.start(); held[id]={osc,env}; markKey(id,true);
  }
  function noteOff(id){
    const n=held[id]; if(!n||!Loom.ctx)return;
    const actx=Loom.ctx; const t=actx.currentTime,rel=Math.max(.003,P.release);
    n.env.gain.cancelScheduledValues(t);
    n.env.gain.setValueAtTime(Math.max(.00001,n.env.gain.value),t);
    n.env.gain.exponentialRampToValueAtTime(.00001,t+rel);
    n.osc.stop(t+rel+.06);
    delete held[id]; markKey(id,false);
  }
  function markKey(id,on){
    const els=$('ms-kb').querySelectorAll('[data-nid]');
    for(let i=0;i<els.length;i++) if(els[i].getAttribute('data-nid')===id) els[i].classList.toggle('on',on);
  }

  function startScope(){
    const cv=$('ms-scope'),wr=$('ms-scope-wrap'),cx=cv.getContext('2d');
    const buf=new Float32Array(analyser.fftSize);
    function sz(){const dpr=window.devicePixelRatio||1;cv.width=wr.offsetWidth*dpr;cv.height=wr.offsetHeight*dpr;}
    sz(); window.addEventListener('resize',sz);
    (function frame(){
      requestAnimationFrame(frame);
      if(!analyser)return;
      analyser.getFloatTimeDomainData(buf);
      const W=cv.width,H=cv.height;
      cx.fillStyle='rgba(5,0,0,0.84)';cx.fillRect(0,0,W,H);
      cx.strokeStyle='rgba(140,14,14,0.15)';cx.lineWidth=1;
      for(let g=1;g<4;g++){cx.beginPath();cx.moveTo(0,H*g/4);cx.lineTo(W,H*g/4);cx.stroke();}
      for(let g=1;g<8;g++){cx.beginPath();cx.moveTo(W*g/8,0);cx.lineTo(W*g/8,H);cx.stroke();}
      cx.strokeStyle='rgba(200,22,22,0.2)';cx.beginPath();cx.moveTo(0,H/2);cx.lineTo(W,H/2);cx.stroke();
      for(let p=0;p<2;p++){
        cx.beginPath();
        cx.strokeStyle=p?'#c41c1c':'rgba(255,45,45,0.08)';cx.lineWidth=p?1.4:6;cx.shadowBlur=p?5:0;cx.shadowColor='#f00';
        const step=Math.max(1,Math.floor(buf.length/W));
        for(let x=0;x<W;x++){const v=buf[x*step]||0,y=(1-(v+1)/2)*H;x?cx.lineTo(x,y):cx.moveTo(x,y);}
        cx.stroke();
      }
      cx.shadowBlur=0;
    })();
  }

  function buildKeyboard(){
    Object.keys(held).forEach(noteOff);
    const wrap=$('ms-kb-wrap'),kb=$('ms-kb');
    if(!wrap||!kb) return;
    kb.innerHTML='';
    const W=wrap.offsetWidth, H=wrap.offsetHeight;
    if(W===0||H===0) return;
    const wkW=W/(rng*7), bkW=wkW*.58, bkH=H*.60;
    for(let oi=0;oi<rng;oi++){
      const o=oct+oi, ox=oi*7*wkW;
      WN.forEach((n,i)=>{ const id=n+o,el=document.createElement('div'); el.className='wk'; el.setAttribute('data-nid',id); el.style.left=(ox+i*wkW)+'px'; el.style.width=(wkW-1)+'px'; bindKey(el,id,n,o); kb.appendChild(el); });
      BN.forEach((n,i)=>{ const id=n+o,el=document.createElement('div'); el.className='bk'; el.setAttribute('data-nid',id); el.style.left=(ox+BP[i]*wkW)+'px'; el.style.width=bkW+'px'; el.style.height=bkH+'px'; bindKey(el,id,n,o); kb.appendChild(el); });
    }
  }
  function bindKey(el,id,n,o){
    const f=hz(n,o);
    el.addEventListener('mousedown',e=>{e.preventDefault();noteOn(id,f);},{passive:false});
    el.addEventListener('mouseup',()=>noteOff(id));
    el.addEventListener('mouseleave',()=>noteOff(id));
    el.addEventListener('touchstart',e=>{e.preventDefault();noteOn(id,f);},{passive:false});
    el.addEventListener('touchend',e=>{e.preventDefault();noteOff(id);},{passive:false});
    el.addEventListener('touchcancel',e=>{e.preventDefault();noteOff(id);},{passive:false});
  }
  function buildWaveSel(){ const grp=$('ms-wave-grp'); ['sine','triangle','sawtooth','square'].forEach(w=>{ const btn=document.createElement('button'); btn.className='sbtn'+(w===wave?' on':''); btn.setAttribute('data-wave',w); const col=w===wave?'#ff4040':'rgba(190,35,35,0.3)'; btn.innerHTML='<svg width="28" height="18" viewBox="0 0 20 24"><path d="'+WPATHS[w]+'" stroke="'+col+'" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'; btn.addEventListener('click',()=>{ wave=w; grp.querySelectorAll('.sbtn[data-wave]').forEach(b=>{ const on=b.getAttribute('data-wave')===w; b.classList.toggle('on',on); b.querySelector('path').setAttribute('stroke',on?'#ff4040':'rgba(190,35,35,0.3)'); }); }); grp.appendChild(btn); }); }
  function buildRngSel(){ const grp=$('ms-rng-grp'); [{v:1,l:'1 OCT'},{v:2,l:'2 OCT'},{v:3,l:'3 OCT'}].forEach(def=>{ const btn=document.createElement('button'); btn.className='sbtn'+(def.v===rng?' on':''); btn.textContent=def.l; btn.setAttribute('data-r',def.v); btn.addEventListener('click',()=>{ rng=def.v; grp.querySelectorAll('.sbtn[data-r]').forEach(b=>b.classList.toggle('on',parseInt(b.getAttribute('data-r'))===rng)); buildKeyboard(); }); grp.appendChild(btn); }); }
  function buildOctSel(){ const grp=$('ms-oct-grp'); [2,3,4,5,6].forEach(o=>{ const btn=document.createElement('button'); btn.className='sbtn'+(o===oct?' on':''); btn.textContent=o; btn.setAttribute('data-o',o); btn.addEventListener('click',()=>{ oct=o; grp.querySelectorAll('.sbtn[data-o]').forEach(b=>b.classList.toggle('on',parseInt(b.getAttribute('data-o'))===o)); buildKeyboard(); }); grp.appendChild(btn); }); }
  function buildKnobs(){ const strip=$('ms-knob-strip'); KNOB_GROUPS.forEach((grp,gi)=>{ if(gi>0){const sep=document.createElement('div');sep.className='kstrip-sep';strip.appendChild(sep);} const wrap=document.createElement('div');wrap.className='kstrip-grp'; const lbl=document.createElement('div');lbl.className='kstrip-lbl';lbl.textContent=grp.lbl; const row=document.createElement('div');row.className='kstrip-row'; grp.knobs.forEach(def=>buildKnob(def,row)); wrap.appendChild(lbl);wrap.appendChild(row);strip.appendChild(wrap); }); }
  function buildKnob(def,container){
    const wrap=document.createElement('div');wrap.className='kwrap';
    const body=document.createElement('div');body.className='kbody';
    for(let i=0;i<11;i++){ const a=-135+i*27,major=(i===0||i===5||i===10); const t=document.createElement('div');t.className='ktick';t.style.transform='rotate('+a+'deg)'; const ln=document.createElement('div'); ln.style.cssText='width:'+(major?2:1.5)+'px;height:'+(major?7:4)+'px;margin-top:2px;border-radius:1px;background:'+(major?'rgba(255,50,50,0.46)':'rgba(195,28,28,0.2)')+';'; t.appendChild(ln);body.appendChild(t); }
    const pw=document.createElement('div');pw.className='kptr'; const nd=document.createElement('div');nd.className='kneedle'; pw.appendChild(nd);body.appendChild(pw);
    const gl=document.createElement('div');gl.className='kgloss';body.appendChild(gl);
    const lbl=document.createElement('div');lbl.className='klbl';lbl.textContent=def.l;
    const vd=document.createElement('div');vd.className='kval';
    wrap.appendChild(body);wrap.appendChild(lbl);wrap.appendChild(vd); container.appendChild(wrap);
    function apply(v){ P[def.p]=v; pw.style.transform='rotate('+(-135+((v-def.min)/(def.max-def.min))*270)+'deg)'; vd.textContent=Math.abs(v)<10?v.toFixed(2):v.toFixed(1); if(bus){ if(def.p==='volume')bus.master.gain.value=v; if(def.p==='reverb')bus.wet.gain.value=v*1.6; } }
    body.addEventListener('mousedown',e=>{ e.preventDefault(); const sy=e.clientY,sv=P[def.p],range=def.max-def.min; const mm=e=>apply(Math.min(def.max,Math.max(def.min,sv+((sy-e.clientY)/120)*range))); const mu=()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);}; window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu); });
    body.addEventListener('touchstart',e=>{ e.preventDefault(); const sy=e.touches[0].clientY,sv=P[def.p],range=def.max-def.min; const tm=e=>{e.preventDefault();apply(Math.min(def.max,Math.max(def.min,sv+((sy-e.touches[0].clientY)/120)*range)));}; const te=()=>{body.removeEventListener('touchmove',tm);body.removeEventListener('touchend',te);body.removeEventListener('touchcancel',te);}; body.addEventListener('touchmove',tm,{passive:false}); body.addEventListener('touchend',te);body.addEventListener('touchcancel',te); },{passive:false});
    apply(def.v);
  }

  const KM={a:['C',0],w:['C#',0],s:['D',0],e:['D#',0],d:['E',0],f:['F',0],t:['F#',0],g:['G',0],y:['G#',0],h:['A',0],u:['A#',0],j:['B',0],k:['C',1],o:['C#',1],l:['D',1],p:['D#',1]};
  const kHeld={};
  window.addEventListener('keydown',e=>{ if(document.documentElement.getAttribute('data-page')!=='keys')return; if(e.repeat||e.metaKey||e.ctrlKey)return; const m=KM[e.key];if(!m)return; const id=m[0]+(oct+m[1]); if(!kHeld[id]){kHeld[id]=true;noteOn(id,hz(m[0],oct+m[1]));} });
  window.addEventListener('keyup',e=>{ const m=KM[e.key];if(!m)return; const id=m[0]+(oct+m[1]); delete kHeld[id];noteOff(id); });

  let rsT;
  window.addEventListener('resize',()=>{ if(document.documentElement.getAttribute('data-page')!=='keys')return; clearTimeout(rsT);rsT=setTimeout(buildKeyboard,120); });

  buildWaveSel(); buildRngSel(); buildOctSel(); buildKnobs();
  window.MSRelayout = buildKeyboard;
})();

/* ── init ── */
setPlayIcon(false);
bpmVal.textContent=Transport.bpm;
